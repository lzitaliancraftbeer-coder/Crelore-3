<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crelore | Agenzia Digitale Innovativa</title>
<meta name="description" content="Trasformiamo le tue idee in esperienze digitali memorabili.">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- BLOBS -->
<div class="blob blob-top"></div>
<div class="blob blob-bottom"></div>

<!-- NAV -->
<nav class="nav">
  <div class="nav-wrapper glass">
    <div class="logo">
      <div class="logo-box">C</div>
      CRE<span>LORE</span>
    </div>

    <div class="nav-links">
      <a href="servizi.html">Servizi</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="contatti.html" class="btn-nav">Contattaci</a>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="badge reveal">
    L'agenzia del futuro, oggi.
  </div>

  <h1 class="reveal delay-1">
    Sviluppiamo il <br>
    <span class="text-gradient">Domani Digitale</span>
  </h1>

  <p class="hero-text reveal delay-2">
    Crelore trasforma idee audaci in esperienze digitali memorabili.
  </p>

  <div class="hero-buttons reveal delay-3">
    <a href="contatti.html" class="btn-primary">Inizia ora</a>
    <a href="portfolio.html" class="btn-glass">Guarda i progetti</a>
  </div>
</section>

<script>
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("active");
    }
  });
},{threshold:0.15});

document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));
</script>

</body>
</html>
