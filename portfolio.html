<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crelore | Portfolio</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header class="navbar glass">
  <div class="container nav-inner">
    <div class="logo">
      <div class="logo-box">C</div>
      CRE<span>LORE</span>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="servizi.html">Servizi</a>
      <a href="contatti.html" class="btn-nav">Contattaci</a>
    </nav>
  </div>
</header>

<section class="portfolio container">
  <h1 class="section-title reveal">Portfolio <span>Selezionato</span></h1>

  <div class="portfolio-grid">
    <div class="portfolio-item reveal">
      <img src="assets/img/project-1.jpg" alt="Progetto Web">
      <h4>NexGen Platform</h4>
      <p>Sviluppo Web & UI Design</p>
    </div>

    <div class="portfolio-item reveal delay-1">
      <img src="assets/img/project-2.jpg" alt="Caso Studio Social">
      <h4>Brand Identity Social</h4>
      <p>Social Strategy & Viral Growth</p>
    </div>
  </div>
</section>

<footer class="footer">
  © 2026 Crelore — Innovazione Digitale
</footer>

<script>
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{ if(entry.isIntersecting){ entry.target.classList.add("active"); } });
},{threshold:0.15});
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

const navbar = document.querySelector(".navbar");
const scrollBar = document.createElement("div");
scrollBar.id = "scroll-bar";
document.body.appendChild(scrollBar);
window.addEventListener("scroll", ()=>{
  const scrollTop = window.scrollY;
  const docHeight = document.body.scrollHeight - window.innerHeight;
  scrollBar.style.width = (scrollTop/docHeight*100)+"%";
  if(scrollTop>20){ navbar.classList.add("scrolled"); } else { navbar.classList.remove("scrolled"); }
});
</script>

</body>
</html>
