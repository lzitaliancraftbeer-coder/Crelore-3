<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crelore | Portfolio</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header class="navbar">
  <div class="logo">CRE<span>LORE</span></div>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="servizi.html">Servizi</a></li>
      <li><a href="portfolio.html">Portfolio</a></li>
      <li><a href="contatti.html" class="btn-nav">Contattaci</a></li>
    </ul>
  </nav>
</header>

<section class="portfolio container">
  <h1 class="section-title reveal">Progetti <span>Selezionati</span></h1>

  <div class="portfolio-grid">
    <div class="portfolio-item reveal">
      <img src="assets/img/project-1.jpg" alt="">
      <h4>NexGen Platform</h4>
      <p>Web & UX Design</p>
    </div>

    <div class="portfolio-item reveal delay-1">
      <img src="assets/img/project-2.jpg" alt="">
      <h4>Brand Social Identity</h4>
      <p>Growth Strategy</p>
    </div>
  </div>
</section>

<!-- CONTATTI PREMIUM -->
<section class="contact-section">
  <div class="contact-container glass">

    <div class="contact-info reveal">
      <h2>Vuoi Essere il Prossimo Caso Studio?</h2>
      <p>Portiamo anche il tuo brand al livello successivo.</p>
      <div class="contact-items">
        <div class="contact-item">
          <div class="icon">
            <svg viewBox="0 0 24 24"><path d="M2 6v12h20V6H2zm10 5l6-4v8l-6-4z"/></svg>
          </div>
          <span>hello@crelore.it</span>
        </div>
      </div>
    </div>

    <div class="contact-form-container reveal delay-1">
      <form onsubmit="event.preventDefault(); alert('Richiesta inviata!');">
        <label>Nome Completo</label>
        <input type="text" required>
        <label>Email Business</label>
        <input type="email" required>
        <label>Di cosa hai bisogno?</label>
        <select>
          <option>Sito Web</option>
          <option>Social Strategy</option>
          <option>Performance Marketing</option>
        </select>
        <button type="submit">Inizia Ora</button>
      </form>
    </div>

  </div>
</section>

<footer class="footer">
  © 2026 Crelore — Innovazione Digitale
</footer>

<script>
const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){ entry.target.classList.add("active"); }
  });
},{threshold:0.15});
document.querySelectorAll(".reveal").forEach(el=>observer.observe(el));

const navbar = document.querySelector("header");
window.addEventListener("scroll", ()=>{
  if(window.scrollY > 20){ navbar.classList.add("scrolled"); }
  else{ navbar.classList.remove("scrolled"); }
});
</script>

</body>
</html>
